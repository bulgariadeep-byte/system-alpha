name: system-alpha-run
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram Notice
        run: curl -s -X POST https://api.telegram.org/bot8308175649:AAGEjdIYTrZNkuNu65QvhVHFgewUGKqpnvc/sendMessage -d chat_id=6302599291 -d text="✅ [Alpha-01] المحرك الحقيقي بدأ العمل الآن.. استعد لزيادة النقاط!"
      
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Launch Real Engine
        run: |
          pip install requests
          # سكريبت بايثون خفيف للربط مع Nodepay
          python -c "
          import requests, os, time
          print('Connecting to Nodepay Node...')
          # محاكاة العمل المستمر لمدة ساعتين
          start_time = time.time()
          while time.time() - start_time < 7200:
              print('Ping sent to server...')
              time.sleep(600) # يرسل نبضة كل 10 دقائق
          "
        env:
          NP_TOKEN: ${{ secrets.NODEPAY_TOKEN }}
