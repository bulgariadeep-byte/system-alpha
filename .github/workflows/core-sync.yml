name: System Core Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'
jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: System Pulse
        run: |
          curl -s -X POST https://api.telegram.org/bot8308175649:AAGEjdIYTrZNkuNu65QvhVHFgewUGKqpnvc/sendMessage \
          -d chat_id=6302599291 \
          -d text="📡 [Alpha-01] فحص النظام: جاري المحاولة الآن..."
      - name: Run Service
        run: |
          docker run -d --name sys-service -e TOKEN="${{ secrets.NODEPAY_TOKEN }}" monoswap/nodepay-extension:latest || true
          sleep 60
          echo "Service is running in background"
