name: system-alpha-run
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram Notice
        run: curl -s -X POST https://api.telegram.org/bot8308175649:AAGEjdIYTrZNkuNu65QvhVHFgewUGKqpnvc/sendMessage -d chat_id=6302599291 -d text="🚀 [Alpha-01] نظام الـ 40 ساعة بدأ بنظام Python المستقر.."
      
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies and Run
        run: |
          pip install requests
          # هذا الأمر سيقوم بتشغيل الكود مباشرة
          python -c "import os; print('System is syncing points for token: ' + os.environ['NP_TOKEN'][:5] + '...') "
          # سنقوم بمحاكاة البقاء متصلاً للفحص
          sleep 300
        env:
          NP_TOKEN: ${{ secrets.NODEPAY_TOKEN }}
