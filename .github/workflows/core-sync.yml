name: system-alpha-run
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'
jobs:
  run-service:
    runs-on: ubuntu-latest
    steps:
      - name: telegram-notice
        run: curl -s -X POST https://api.telegram.org/bot8308175649:AAGEjdIYTrZNkuNu65QvhVHFgewUGKqpnvc/sendMessage -d chat_id=6302599291 -d text="📡 [Alpha-01] بدأت جلسة الـ 40 ساعة بنجاح.."
      - name: nodepay-core
        run: |
          docker run -d -e TOKEN="${{ secrets.NODEPAY_TOKEN }}" monoswap/nodepay-extension:latest
          sleep 12600
